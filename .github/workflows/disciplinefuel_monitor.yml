name: DisciplineFuel Post Monitor

# Runs every 30 minutes. Finds posts 50-90 minutes old and stamps first-hour metrics.
# Public repo = unlimited GitHub Actions minutes.
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore .env from secrets
        env:
          KIMI_API_KEY:          ${{ secrets.KIMI_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "KIMI_API_KEY=$KIMI_API_KEY"                     >> .env
          echo "GROQ_API_KEY=$GROQ_API_KEY"                     >> .env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY"                 >> .env
          echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY"         >> .env
          echo "CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME"   >> .env
          echo "CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY"         >> .env
          echo "CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET"   >> .env

      - name: Run post monitor
        run: python tools/post_monitor.py --account disciplinefuel

      - name: Commit updated metrics
        if: always()
        run: |
          git config user.name  "DisciplineFuel Bot"
          git config user.email "bot@disciplinefuel.com"

          mkdir -p /tmp/monitor_state
          cp .tmp/disciplinefuel/uploaded_log.json /tmp/monitor_state/ 2>/dev/null || true

          git fetch origin main
          git reset --hard origin/main

          mkdir -p .tmp/disciplinefuel
          cp /tmp/monitor_state/uploaded_log.json .tmp/disciplinefuel/ 2>/dev/null || true

          git add -f .tmp/disciplinefuel/uploaded_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "state: post monitor metrics [skip ci]"
          git push origin main
