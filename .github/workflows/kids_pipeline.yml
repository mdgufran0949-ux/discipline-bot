name: Biscuit & Zara Kids Pipeline

on:
  schedule:
    - cron: '0 4 * * *'    # 09:30 IST daily
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore .env from secrets
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          KIMI_API_KEY:       ${{ secrets.KIMI_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AIMLAPI_KEY:        ${{ secrets.AIMLAPI_KEY }}
          FAL_API_KEY:        ${{ secrets.FAL_API_KEY }}
        run: |
          echo "GROQ_API_KEY=$GROQ_API_KEY"             >> .env
          echo "KIMI_API_KEY=$KIMI_API_KEY"             >> .env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY"         >> .env
          echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> .env
          echo "AIMLAPI_KEY=$AIMLAPI_KEY"               >> .env
          echo "FAL_API_KEY=$FAL_API_KEY"               >> .env

      - name: Restore YouTube token
        env:
          YOUTUBE_TOKEN_B64: ${{ secrets.YOUTUBE_TOKEN_B64 }}
        run: |
          if [ -n "$YOUTUBE_TOKEN_B64" ]; then
            mkdir -p .tmp
            echo "$YOUTUBE_TOKEN_B64" | base64 -d > .tmp/youtube_token.pkl
            echo "YouTube token restored"
          fi

      - name: Restore Kids channel memory
        run: |
          mkdir -p .tmp/biscuit_zara .tmp/kids_channel

      - name: Run Kids pipeline
        run: python tools/run_kids_pipeline.py --count 1

      - name: Commit state files back to repo
        if: always()
        run: |
          # Save pipeline outputs BEFORE git reset wipes tracked files
          cp .tmp/biscuit_zara/memory.json          /tmp/mem.json         2>/dev/null || true
          cp .tmp/biscuit_zara/strategy_report.json /tmp/strategy.json    2>/dev/null || true
          cp .tmp/biscuit_zara/performance.json     /tmp/perf.json        2>/dev/null || true
          cp .tmp/kids_channel/upload_log.json      /tmp/upload_log.json  2>/dev/null || true
          cp config/accounts/biscuit_zara.json      /tmp/bz_config.json   2>/dev/null || true

          git config user.name  "BiscuitZara Bot"
          git config user.email "bot@biscuitzara.local"
          git fetch origin main
          git reset --hard origin/main

          # Restore the freshly generated files
          mkdir -p .tmp/biscuit_zara .tmp/kids_channel
          cp /tmp/mem.json         .tmp/biscuit_zara/memory.json          2>/dev/null || true
          cp /tmp/strategy.json    .tmp/biscuit_zara/strategy_report.json 2>/dev/null || true
          cp /tmp/perf.json        .tmp/biscuit_zara/performance.json     2>/dev/null || true
          cp /tmp/upload_log.json  .tmp/kids_channel/upload_log.json      2>/dev/null || true
          cp /tmp/bz_config.json   config/accounts/biscuit_zara.json      2>/dev/null || true

          git add -f .tmp/biscuit_zara/memory.json        2>/dev/null || true
          git add -f .tmp/kids_channel/upload_log.json    2>/dev/null || true
          git add -f .tmp/biscuit_zara/performance.json   2>/dev/null || true
          git add -f .tmp/biscuit_zara/strategy_report.json 2>/dev/null || true
          git add    config/accounts/biscuit_zara.json    2>/dev/null || true
          git diff --staged --quiet || git commit -m "state: biscuit_zara after pipeline run [skip ci]"
          git push origin main
